name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. latest, v1.0.0)"
        required: false
        default: "latest"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # DOCKERHUB_PASSWORD should be a Docker Hub access token (preferred over a plain password).
          # Generate one at https://hub.docker.com/settings/security and store it as this secret.
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ github.event.inputs.tag }}
